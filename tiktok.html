<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TikTok – Actividad</title>
  <script src="src/config.js" defer></script>
  <script src="src/app-page.js" defer></script>
  <link rel="stylesheet" href="src/app-page.css" />
</head>
<body style="--brand-color:#fe2c55; --brand-color-soft:rgba(254,44,85,0.18);">
  <div class="page">
    <div class="header">
      <div class="brand">
        <div class="brand-icon">♪</div>
        <div class="brand-info">
          <h1>TikTok</h1>
          <p>Videos, comentarios y actividad viral.</p>
        </div>
      </div>
      <a class="back-link" href="dashboard.html">← Volver al dashboard</a>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <label for="searchInput">Buscar por video, comentario o alerta</label>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="Ej. viral, comentario, tendencia..." />
          <button id="clearSearch" type="button">Limpiar</button>
        </div>
      </div>
      <div class="actions-row">
        <button id="sortContactBtn" class="action-button active">Ordenar por contacto</button>
        <button id="sortMessageBtn" class="action-button">Ordenar por mensaje</button>
      </div>
    </div>

    <div class="content">
      <aside class="sidebar">
        <h2>Indicadores</h2>
        <div class="stats-grid">
          <div class="stat-card"><strong id="countMessages">0</strong><span>Eventos totales</span></div>
          <div class="stat-card"><strong id="countAlerts">0</strong><span>Comentarios</span></div>
          <div class="stat-card"><strong id="countContacts">—</strong><span>Contactos</span></div>
        </div>
        <div class="filter-group">
          <h3>Filtrar por tipo</h3>
          <button class="filter-pill active" data-type="all">Todos</button>
          <button class="filter-pill" data-type="message">Mensajes</button>
          <button class="filter-pill" data-type="notificacion">Notificaciones</button>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>TikTok</h2>
            <p class="panel-subtitle">Filtra tendencias y alertas por texto o contacto.</p>
          </div>
          <span id="resultCount" class="result-count">0 elementos</span>
        </div>
        <div id="app-list" class="chat-list">Cargando...</div>
      </section>
    </div>
  </div>

  <script>
    const fallbackSample = [
      { contact: 'Tendencia', msg: 'Video viral con interacción clave detectada.', timestamp: '2026-06-28T13:12:00', type: 'message' },
      { contact: 'Comentario', msg: 'Un usuario comentó tu video.', timestamp: '2026-06-28T12:36:00', type: 'message' },
    ];

    const appState = createAppPageState(APP_PAGE_CONFIG.tiktok);
    appState.loadPage(fallbackSample);
  </script>
</body>
</html>
