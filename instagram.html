<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instagram – Actividad</title>
  <script src="src/config.js" defer></script>
  <script src="src/app-page.js" defer></script>
  <link rel="stylesheet" href="src/app-page.css" />
</head>
<body style="--brand-color:#ff5ed9; --brand-color-soft:rgba(255,94,217,0.18);">
  <div class="page">
    <div class="header">
      <div class="brand">
        <div class="brand-icon">📸</div>
        <div class="brand-info">
          <h1>Instagram</h1>
          <p>Actividad, comentarios y reacciones filtrables.</p>
        </div>
      </div>
      <a class="back-link" href="dashboard.html">← Volver al dashboard</a>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <label for="searchInput">Buscar por contacto o mensaje</label>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="Ej. Agente Luna, comentario..." />
          <button id="clearSearch" type="button">Limpiar</button>
        </div>
      </div>
      <div class="actions-row">
        <button id="sortContactBtn" class="action-button active">Ordenar por contacto</button>
        <button id="sortMessageBtn" class="action-button">Ordenar por mensaje</button>
      </div>
    </div>

    <div class="content">
      <aside class="sidebar">
        <h2>Indicadores</h2>
        <div class="stats-grid">
          <div class="stat-card"><strong id="countMessages">0</strong><span>Publicaciones totales</span></div>
          <div class="stat-card"><strong id="countAlerts">0</strong><span>Likes y reacciones</span></div>
          <div class="stat-card"><strong id="countContacts">—</strong><span>Contactos</span></div>
        </div>
        <div class="filter-group">
          <h3>Filtrar por tipo</h3>
          <button class="filter-pill active" data-type="all">Todos</button>
          <button class="filter-pill" data-type="message">Mensajes</button>
          <button class="filter-pill" data-type="notificacion">Notificaciones</button>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Instagram</h2>
            <p class="panel-subtitle">Filtra interacción social con búsqueda por mensaje o contacto.</p>
          </div>
          <span id="resultCount" class="result-count">0 elementos</span>
        </div>
        <div id="app-list" class="chat-list">Cargando...</div>
      </section>
    </div>
  </div>

  <script>
    const fallbackSample = [
      { contact: 'Agente Luna', msg: 'Story publicada con ubicación detectada.', timestamp: '2026-06-28T13:05:00', type: 'message' },
      { contact: 'Seguidor', msg: 'Comentario: "Todo listo"', timestamp: '2026-06-28T12:50:00', type: 'message' },
    ];

    const appState = createAppPageState(APP_PAGE_CONFIG.instagram);
    appState.loadPage(fallbackSample);
  </script>
</body>
</html>
