<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Telegram – Mensajes</title>
  <script src="src/config.js" defer></script>
  <script src="src/app-page.js" defer></script>
  <link rel="stylesheet" href="src/app-page.css" />
</head>
<body style="--brand-color:#18a0fb; --brand-color-soft:rgba(24,160,251,0.18);">
  <div class="page">
    <div class="header">
      <div class="brand">
        <div class="brand-icon">✈</div>
        <div class="brand-info">
          <h1>Telegram</h1>
          <p>Mensajes seguros, canales y notificaciones.</p>
        </div>
      <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
        <a class="back-link" href="seleccion.html">← Volver a Selección</a>
        <a class="back-link" href="dashboard.html" style="background: rgba(0,240,255,0.15); border-color: #00f0ff; color: #00f0ff; box-shadow: 0 0 15px rgba(0,240,255,0.2);">📊 Dashboard Central</a>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <label for="searchInput">Buscar por contacto o mensaje</label>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="Ej. Canal Sigma, actualización..." />
          <button id="clearSearch" type="button">Limpiar</button>
        </div>
      </div>
      <div class="actions-row">
        <button id="sortContactBtn" class="action-button active">Ordenar por contacto</button>
        <button id="sortMessageBtn" class="action-button">Ordenar por mensaje</button>
      </div>
    </div>

    <div class="content">
      <aside class="sidebar">
        <h2>Indicadores</h2>
        <div class="stats-grid">
          <div class="stat-card"><strong id="countMessages">0</strong><span>Mensajes totales</span></div>
          <div class="stat-card"><strong id="countAlerts">0</strong><span>Notificaciones</span></div>
          <div class="stat-card"><strong id="countContacts">—</strong><span>Contactos</span></div>
        </div>
        <div class="filter-group">
          <h3>Filtrar por tipo</h3>
          <button class="filter-pill active" data-type="all">Todos</button>
          <button class="filter-pill" data-type="message">Mensajes</button>
          <button class="filter-pill" data-type="notificacion">Notificaciones</button>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Telegram</h2>
            <p class="panel-subtitle">Filtra chats y alertas de Telegram por contacto o texto.</p>
          </div>
          <span id="resultCount" class="result-count">0 elementos</span>
        </div>
        <div id="app-list" class="chat-list">Cargando...</div>
      </section>
    </div>
  </div>

  <script>
    const fallbackSample = [
      { contact: 'Canal Sigma', msg: 'Mensaje cifrado recibido.', timestamp: '2026-06-28T12:44:00', type: 'message' },
      { contact: 'Agente Z', msg: 'Actualización en 10 minutos.', timestamp: '2026-06-28T12:16:00', type: 'message' },
    ];

    const appState = createAppPageState(APP_PAGE_CONFIG.telegram);
    appState.loadPage(fallbackSample);
  </script>
</body>
</html>
