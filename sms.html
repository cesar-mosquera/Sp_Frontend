<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SMS – Mensajes</title>
  <script src="src/config.js" defer></script>
  <script src="src/app-page.js" defer></script>
  <link rel="stylesheet" href="src/app-page.css" />
</head>
<body style="--brand-color:#00ffb8; --brand-color-soft:rgba(0,255,184,0.18);">
  <div class="page">
    <div class="header">
      <div class="brand">
        <div class="brand-icon">✉</div>
        <div class="brand-info">
          <h1>SMS</h1>
          <p>Mensajes de texto con búsqueda y clasificación.</p>
        </div>
      </div>
      <a class="back-link" href="dashboard.html">← Volver al dashboard</a>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <label for="searchInput">Buscar por remitente o texto</label>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="Ej. Banco, código, envío..." />
          <button id="clearSearch" type="button">Limpiar</button>
        </div>
      </div>
      <div class="actions-row">
        <button id="sortContactBtn" class="action-button active">Ordenar por contacto</button>
        <button id="sortMessageBtn" class="action-button">Ordenar por mensaje</button>
      </div>
    </div>

    <div class="content">
      <aside class="sidebar">
        <h2>Indicadores</h2>
        <div class="stats-grid">
          <div class="stat-card"><strong id="countMessages">0</strong><span>SMS totales</span></div>
          <div class="stat-card"><strong id="countAlerts">0</strong><span>No leídos</span></div>
          <div class="stat-card"><strong id="countContacts">—</strong><span>Remitentes</span></div>
        </div>
        <div class="filter-group">
          <h3>Filtrar por tipo</h3>
          <button class="filter-pill active" data-type="all">Todos</button>
          <button class="filter-pill" data-type="message">Mensajes</button>
          <button class="filter-pill" data-type="notificacion">Notificaciones</button>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>SMS</h2>
            <p class="panel-subtitle">Filtra SMS por remitente y contenido.</p>
          </div>
          <span id="resultCount" class="result-count">0 elementos</span>
        </div>
        <div id="app-list" class="chat-list">Cargando...</div>
      </section>
    </div>
  </div>

  <script>
    const fallbackSample = [
      { contact: 'Banco', msg: 'Tu OTP expira en 4 minutos.', timestamp: '2026-06-28T11:50:00', type: 'message' },
      { contact: 'Paquete', msg: 'Tu envío llegará hoy.', timestamp: '2026-06-28T10:20:00', type: 'message' },
    ];

    const appState = createAppPageState(APP_PAGE_CONFIG.sms);
    appState.loadPage(fallbackSample);
  </script>
</body>
</html>
